<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تسجيل الدخول - لوحة التحكم</title>
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <h1>تسجيل الدخول</h1>
      <p class="sub">لوحة تحكم موقع جاد العبدالله للمحاماة — للاستخدام المحلي فقط.</p>
      <div id="alertBox" class="alert alert-error"></div>
      <form id="loginForm">
        <div class="field">
          <label for="username">اسم المستخدم</label>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">دخول</button>
      </form>
    </div>
  </div>
  <script>
    const form = document.getElementById("loginForm");
    const alertBox = document.getElementById("alertBox");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      alertBox.classList.remove("show");
      submitBtn.disabled = true;
      submitBtn.textContent = "جارٍ الدخول...";
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value,
          }),
        });
        const result = await res.json();
        if (!result.ok) throw new Error(result.error || "تعذر تسجيل الدخول.");
        window.location.href = "/admin/dashboard.html";
      } catch (err) {
        alertBox.textContent = err.message;
        alertBox.classList.add("show");
        submitBtn.disabled = false;
        submitBtn.textContent = "دخول";
      }
    });
  </script>
</body>
</html>
